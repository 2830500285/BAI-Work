name: Windows x64 Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to update
        required: true
        default: v0.1.0

permissions:
  contents: write

concurrency:
  group: bai-work-windows-x64
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  RELEASE_CHANNEL: frontier
  BAI_WORK_UPDATE_CHANNEL: frontier

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = '${{ inputs.tag }}'.TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+$') { throw "Invalid release version: $version" }
          "ARTIFACT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up supported Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify native runner
        shell: pwsh
        run: |
          if ($env:PROCESSOR_ARCHITECTURE -ne 'AMD64') {
            throw "Expected AMD64 runner, got $env:PROCESSOR_ARCHITECTURE"
          }
          python -c "import platform; assert platform.machine() == 'AMD64', platform.machine()"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Focused tests
        run: >
          npm run test --
          src/main/packaging-config.test.ts
          src/main/runtime/bai-work-adapter.test.ts
          src/main/services/bai-runtime-instruction-service.test.ts
          src/main/services/ecc-mapping-service.test.ts
          src/main/services/ecc-source-service.test.ts

      - name: Smoke official BAI Code wheelhouse
        shell: pwsh
        run: |
          $venv = Join-Path $env:RUNNER_TEMP 'bai-code-wheel-smoke'
          python -m venv $venv
          $venvPython = Join-Path $venv 'Scripts\python.exe'
          $venvBaiCode = Join-Path $venv 'Scripts\baicode.exe'
          & $venvPython -m pip install `
            --no-index `
            --find-links resources\bai-code-official\wheelhouse\win_amd64-cp311 `
            baicode==0.9.1
          if ($LASTEXITCODE -ne 0) { throw 'Offline BAI Code installation failed.' }
          & $venvBaiCode --version
          if ($LASTEXITCODE -ne 0) { throw 'BAI Code CLI smoke failed.' }

      - name: Build Windows release
        shell: pwsh
        run: |
          $env:BAI_WORK_APP_VERSION = $env:ARTIFACT_VERSION
          npm run dist:win

      - name: Verify Windows x64 package
        shell: pwsh
        run: |
          $app = 'dist\win-unpacked\BAI Work.exe'
          $resources = 'dist\win-unpacked\resources'
          $installer = "dist\BAI-Work-$env:ARTIFACT_VERSION-win-x64.exe"
          if (-not (Test-Path $app)) { throw "Missing packaged app: $app" }
          if (-not (Test-Path $installer)) { throw "Missing installer: $installer" }
          if (-not (Test-Path "$resources\BAI-Code-Official")) { throw 'Missing BAI-Code-Official.' }
          if (Test-Path "$resources\BAI-Code-Runtime") { throw 'Intel runtime leaked into Windows package.' }
          foreach ($tag in @('cp310', 'cp311', 'cp312', 'cp313')) {
            $wheel = "$resources\BAI-Code-Official\wheelhouse\win_amd64-$tag\baicode-0.9.1-$tag-$tag-win_amd64.whl"
            if (-not (Test-Path $wheel)) { throw "Missing official wheel: $wheel" }
          }
          $bytes = [System.IO.File]::ReadAllBytes($app)
          $peOffset = [System.BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [System.BitConverter]::ToUInt16($bytes, $peOffset + 4)
          if ($machine -ne 0x8664) { throw ('Expected x64 PE machine 0x8664, got 0x{0:x4}' -f $machine) }
          Write-Host ('Installer signature: ' + (Get-AuthenticodeSignature $installer).Status)

      - name: Start packaged app and smoke runtime health
        shell: pwsh
        run: npm run verify:packaged-runtime -- "dist\win-unpacked\BAI Work.exe"

      - name: Create checksums
        shell: pwsh
        run: |
          $files = @(
            "dist\BAI-Work-$env:ARTIFACT_VERSION-win-x64.exe",
            "dist\BAI-Work-$env:ARTIFACT_VERSION-win-x64.exe.blockmap"
          )
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLowerInvariant()
            "$hash  $([System.IO.Path]::GetFileName($file))"
          }
          $lines | Set-Content -Encoding ascii dist\SHA256SUMS-windows-x64.txt

      - name: Upload Windows release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = '${{ inputs.tag }}'
          $installer = "dist\BAI-Work-$env:ARTIFACT_VERSION-win-x64.exe"
          $blockmap = "$installer.blockmap"
          & gh release upload $tag `
            $installer `
            $blockmap `
            'dist\latest.yml' `
            'dist\SHA256SUMS-windows-x64.txt' `
            --clobber
          if ($LASTEXITCODE -ne 0) { throw 'GitHub release upload failed.' }

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bai-work-windows-x64-release
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/BAI-Work-*-win-x64.exe
            dist/BAI-Work-*-win-x64.exe.blockmap
            dist/latest.yml
            dist/SHA256SUMS-windows-x64.txt
